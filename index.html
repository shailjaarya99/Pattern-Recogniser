<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cipher Detective</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="main-container">

    <!-- LEFT SIDEBAR -->
    <div class="sidebar">

        <h2>Investigations</h2>

        <div id="historyList">

            <div class="history-item">
                Caesar Cipher
            </div>

        </div>

    </div>

    <!-- MAIN CHAT AREA -->
    <div class="chat-area">

        <div class="chat-header">
            <h1>Cipher Detective</h1>
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-bar">

            <input
                type="text"
                id="cipherInput"
                placeholder="Enter text, symbols or code..."
            >

            <button id="camBtn">
                📷
            </button>

            <button id="sendBtn">
                ➤
            </button>

            <input
                type="file"
                id="mediaInput"
                accept="image/*"
                capture="environment"
                hidden
            >

        </div>

    </div>

</div>

<script>

const sendBtn = document.getElementById("sendBtn");

const cipherInput = document.getElementById("cipherInput");

const messagesContainer = document.getElementById("messages");

const camBtn = document.getElementById("camBtn");

const mediaInput = document.getElementById("mediaInput");

const historyList = document.getElementById("historyList");


// AUTO SCROLL

function scrollToBottom() {

    messagesContainer.scrollTop =
    messagesContainer.scrollHeight;

}


// HISTORY ENGINE

function addToHistory(text) {

    const shortText =
    text.length > 25
    ? text.substring(0, 22) + "..."
    : text;

    const historyItem =
    document.createElement("div");

    historyItem.className =
    "history-item";

    historyItem.innerText =
    shortText;

    historyItem.addEventListener(
        "click",
        () => {

            cipherInput.value = text;

            cipherInput.focus();

        }
    );

    historyList.insertBefore(
        historyItem,
        historyList.firstChild
    );

}


// SEND DATA

async function sendData() {

    const text =
    cipherInput.value.trim();

    if (!text) return;


    addToHistory(text);


    const userDiv =
    document.createElement("div");

    userDiv.className =
    "user-message";

    userDiv.innerText =
    text;

    messagesContainer.appendChild(
        userDiv
    );


    cipherInput.value = "";

    scrollToBottom();


    try {

        const response =
        await fetch("/analyze", {

            method: "POST",

            headers: {
                "Content-Type":
                "application/json"
            },

            body: JSON.stringify({
                text: text
            })

        });

        const data =
        await response.json();


        if (data.error) {

            const errorDiv =
            document.createElement("div");

            errorDiv.className =
            "result-card";

            errorDiv.innerHTML = `
                <h2>Error</h2>
                <p>${data.error}</p>
            `;

            messagesContainer.appendChild(
                errorDiv
            );

            scrollToBottom();

            return;

        }


        if (!data || data.length === 0) {

            const noResultDiv =
            document.createElement("div");

            noResultDiv.className =
            "result-card";

            noResultDiv.innerHTML = `
                <h2>Pattern Unresolved</h2>

                <p>
                    The analyzer could not
                    determine a reliable match.
                </p>
            `;

            messagesContainer.appendChild(
                noResultDiv
            );

        }

        else {

            data.forEach(result => {

                const cardDiv =
                document.createElement("div");

                cardDiv.className =
                "result-card";

                cardDiv.innerHTML = `

                    <h2>
                        ${result.solution}
                    </h2>

                    <p>
                        <b>Confidence:</b>
                        ${result.confidence}%
                    </p>

                    <p>
                        <b>Logic:</b>
                        ${result.reason}
                    </p>

                    ${
                        result.shift
                        ?
                        `<p>
                            <b>Shift:</b>
                            ${result.shift}
                        </p>`
                        :
                        ''
                    }

                `;

                messagesContainer.appendChild(
                    cardDiv
                );

            });

        }

        scrollToBottom();

    }

    catch(error) {

        console.error(error);

        const failDiv =
        document.createElement("div");

        failDiv.className =
        "result-card";

        failDiv.innerHTML = `
            <h2>Server Error</h2>

            <p>
                Could not connect to
                Flask backend.
            </p>
        `;

        messagesContainer.appendChild(
            failDiv
        );

        scrollToBottom();

    }

}


// CAMERA

camBtn.addEventListener(
    "click",
    () => {

        mediaInput.click();

    }
);


// IMAGE UPLOAD

mediaInput.addEventListener(
    "change",
    () => {

        if (
            mediaInput.files.length === 0
        ) return;

        const file =
        mediaInput.files[0];


        const uploadDiv =
        document.createElement("div");

        uploadDiv.className =
        "user-message";

        uploadDiv.innerText =
        `📸 Uploaded: ${file.name}`;

        messagesContainer.appendChild(
            uploadDiv
        );


        const replyDiv =
        document.createElement("div");

        replyDiv.className =
        "result-card";

        replyDiv.innerHTML = `

            <h2>
                Image Captured
            </h2>

            <p>
                File successfully loaded.
            </p>

            <p>
                OCR processing can be
                connected later.
            </p>

        `;

        messagesContainer.appendChild(
            replyDiv
        );

        scrollToBottom();

    }
);


// BUTTON EVENTS

sendBtn.addEventListener(
    "click",
    sendData
);


cipherInput.addEventListener(
    "keypress",
    function(event) {

        if (
            event.key === "Enter"
        ) {

            sendData();

        }

    }
);

</script>

</body>
</html>
